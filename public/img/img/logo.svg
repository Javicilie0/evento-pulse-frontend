<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" shape-rendering="geometricPrecision">
  <defs>
    <clipPath id="ticket-clip">
      <path d="
        M60,0 H440 Q500,0 500,60 V140
        A60,60,0,0,1 500,260
        V320 Q500,380 440,380 H60 Q0,380 0,320 V260
        A60,60,0,0,1 0,140
        V60 Q0,0 60,0 Z
      "/>
    </clipPath>
  </defs>

  <!-- Background ticket shape -->
  <path d="
    M60,0 H440 Q500,0 500,60 V140
    A60,60,0,0,1 500,260
    V320 Q500,380 440,380 H60 Q0,380 0,320 V260
    A60,60,0,0,1 0,140
    V60 Q0,0 60,0 Z
  " fill="#6c5ce7"/>

  <!-- Right darker half -->
  <rect x="290" y="0" width="210" height="380" fill="#4a39c4" clip-path="url(#ticket-clip)"/>

  <!-- Dashed divider line -->
  <line x1="290" y1="30" x2="290" y2="160" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-dasharray="8,6"/>
  <line x1="290" y1="220" x2="290" y2="350" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-dasharray="8,6"/>

  <!-- Heartbeat / EKG line -->
  <polyline
    points="30,190 100,190 130,110 160,270 200,130 230,250 260,190 320,190 350,140 370,240 390,190 470,190"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#ticket-clip)"
  />
</svg>
